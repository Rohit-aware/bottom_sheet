name: Publish to NPM

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Required to request the OIDC JWT token from GitHub
      id-token: write
      # Required to push the version bump commit and tag back to GitHub
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so git can push changes back successfully
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push changes
        run: |
          # Increment the patch version (e.g. 1.0.0 -> 1.0.1)
          # [skip ci] prevents the resulting commit from triggering another workflow run
          npm version patch -m "chore(release): %s [skip ci]"
          
          # Push the commit and the Git tag back to GitHub
          git push origin HEAD:main --follow-tags

      - name: Publish to NPM
        run: |
          # Read the newly bumped package version
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          
          echo "Publishing version $PACKAGE_VERSION of $PACKAGE_NAME..."
          npm publish --provenance --access public
